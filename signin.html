<!DOCTYPE html>
<html>

<head>

<meta charset="UTF-8">

<title>Sign In | CafeHub</title>

<script src="https://cdn.tailwindcss.com"></script>

</head>

<body class="min-h-screen bg-cover bg-center flex items-center justify-center"

style="background-image:url('https://images.unsplash.com/photo-1509042239860-f550ce710b93?auto=format&fit=crop&w=1600&q=80');">

<div class="bg-white/90 backdrop-blur-lg p-10 rounded-3xl shadow-2xl w-full max-w-md">

<h1 class="text-4xl font-bold text-center text-[#4B5136] mb-2">

CafeHub

</h1>

<p class="text-center text-gray-600 mb-8">

Welcome back!

</p>

<form onsubmit="return validateSignin()">

<input
id="email"
type="email"
placeholder="Email Address"
required
class="w-full p-3 border rounded-xl mb-4 focus:outline-none focus:ring-2 focus:ring-[#6B4426]"
>

<input
id="signinPassword"
type="password"
placeholder="Password"
required
minlength="6"
class="w-full p-3 border rounded-xl mb-6 focus:outline-none focus:ring-2 focus:ring-[#6B4426]"
>

<button
type="submit"
class="w-full bg-[#6B4426] text-white py-3 rounded-xl hover:bg-[#553519] transition"
>

Sign In

</button>

</form>

<p class="text-center mt-6">

Don't have an account?

<a
href="signup.html"
class="text-[#6B4426] font-semibold"
>

Sign Up

</a>

</p>

<div class="text-center mt-6">

<a
href="index.html"
class="text-gray-500 hover:text-black"
>

← Back to Home

</a>

</div>

</div>

<script src="script.js"></script>

</body>

</html>
